<div class="page-wrapper">

  <div class="form-container">

    <div class="form-header">
      <h2>Create Invoice</h2>
      <p>Fill in the details below to generate a new invoice</p>
    </div>

    <div class="form-body">

      <div class="form-group">
        <label>Invoice Number</label>
        <input type="text" [(ngModel)]="invoice.invoiceNumber">
      </div>

      <div class="form-group">
        <label>Customer Name</label>
        <input type="text" [(ngModel)]="invoice.customerName">
      </div>

      <div class="form-group">
        <label>Tax Percentage</label>
        <input type="number" [(ngModel)]="invoice.taxPercent">
      </div>

      <button class="primary-btn" (click)="create()">
        Create Invoice
      </button>

    </div>

  </div>

</div>
