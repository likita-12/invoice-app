<div class="page-wrapper">

  <div class="form-container">

    <div class="form-header">
      <h2>Create Invoice</h2>
      <p>Fill in the details below to generate a new invoice</p>
    </div>

    <!-- ✅ ADD FORM -->
    <form class="form-body" (ngSubmit)="create()">

      <div class="form-group">
        <label>Invoice Number</label>
        <input type="text"
               name="invoiceNumber"
               [(ngModel)]="invoice.invoiceNumber"
               required>
      </div>

      <div class="form-group">
        <label>Customer Name</label>
        <input type="text"
               name="customerName"
               [(ngModel)]="invoice.customerName"
               required>
      </div>

      <div class="form-group">
        <label>Tax Percentage</label>
        <input type="number"
               name="taxPercent"
               [(ngModel)]="invoice.taxPercent"
               required>
      </div>

      <!-- ✅ CHANGE BUTTON TYPE -->
      <button type="submit" class="primary-btn">
        Create Invoice
      </button>

    </form>

  </div>

</div>
